services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_INIT_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_INIT_PASSWORD:-change-me-influx-admin}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-iot}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-iot_telemetry}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-CHANGE_ME_INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - iot-net

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-iot-backend-subscriber}
      MQTT_KEEPALIVE: ${MQTT_KEEPALIVE:-60}
      MQTT_TOPICS: ${MQTT_TOPICS:-devices/+/telemetry}
      MQTT_QOS: ${MQTT_QOS:-0}
      MQTT_MAX_MESSAGES: ${MQTT_MAX_MESSAGES:-500}
      INFLUX_ENABLED: ${INFLUX_ENABLED:-true}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-CHANGE_ME_INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-iot}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-iot_telemetry}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT:-sensor_readings}
    depends_on:
      - influxdb
    networks:
      - iot-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - iot-net

networks:
  iot-net:
    external: true

volumes:
  influxdb-data:
