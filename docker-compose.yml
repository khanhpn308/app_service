services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "netstat -tln | grep -q 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - iot-net

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    depends_on:
      mosquitto:
        condition: service_healthy
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-iot-backend-subscriber}
      MQTT_KEEPALIVE: ${MQTT_KEEPALIVE:-60}
      MQTT_TOPICS: ${MQTT_TOPICS:-devices/+/telemetry}
      MQTT_QOS: ${MQTT_QOS:-0}
      MQTT_MAX_MESSAGES: ${MQTT_MAX_MESSAGES:-500}
      INFLUX_ENABLED: ${INFLUX_ENABLED:-true}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-CHANGE_ME_INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-iot}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-iot_telemetry}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT:-sensor_readings}
    networks:
      - iot-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - iot-net

networks:
  iot-net:
    external: true

volumes:
  mosquitto_data:
  mosquitto_log:
